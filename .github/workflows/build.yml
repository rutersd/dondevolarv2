name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar dependencias
        run: npm install

      - name: Sincronizar archivos web
        run: node node_modules/@capacitor/cli/bin/capacitor sync android

      - name: Copiar iconos de app
        run: |
          for size in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            if [ -f "app-icons/mipmap-${size}_ic_launcher.png" ]; then
              cp "app-icons/mipmap-${size}_ic_launcher.png" "android/app/src/main/res/mipmap-${size}/ic_launcher.png"
              cp "app-icons/mipmap-${size}_ic_launcher.png" "android/app/src/main/res/mipmap-${size}/ic_launcher_round.png"
            fi
          done

      - name: Copiar splash screens
        run: |
          for size in mdpi hdpi xhdpi xxhdpi; do
            mkdir -p "android/app/src/main/res/drawable-${size}"
            if [ -f "app-splash/drawable-${size}_splash.png" ]; then
              cp "app-splash/drawable-${size}_splash.png" "android/app/src/main/res/drawable-${size}/splash.png"
            fi
          done

      - name: Dar permisos a gradlew
        run: chmod +x android/gradlew

      - name: Compilar APK debug
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: DroneCheck-ES-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
